<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LandX — Arsa Pazaryeri</title>
  <meta name="description" content="LandX — AI-first arsa pazaryeri. Alıcı, satıcı ve yönetici panelleri.">
  <meta name="theme-color" content="#6366f1">

  <!-- Inline SVG favicon: harita üçgeni + nokta -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%236366f1'/%3E%3Cpath d='M8 22 L16 8 L24 22 Z' fill='%23ffffff' opacity='0.95'/%3E%3Ccircle cx='16' cy='17' r='2.4' fill='%236366f1'/%3E%3C/svg%3E">

  <!-- Open Graph -->
  <meta property="og:title" content="LandX — Arsa Pazaryeri">
  <meta property="og:description" content="AI-first arsa pazaryeri. Mobile-first SaaS demosu.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://karacaismail.github.io/landxpanelpages/">
  <meta name="twitter:card" content="summary">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- Desktop sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Header -->
  <header class="app-header">
    <div class="brand">
      <i class="ph-fill ph-map-trifold"></i>
      <span>LandX</span>
    </div>
    <div class="header-search-wrap hide-mobile">
      <div class="input" style="background:var(--surface-2);">
        <i class="ph ph-magnifying-glass"></i>
        <input id="headerSearch" type="text" placeholder="İlan ara: 'İstanbul', 'konut'..." aria-label="Hızlı ara">
      </div>
      <div id="headerSearchDD" class="header-search-dd"></div>
    </div>

    <div class="header-spacer"></div>

    <div class="role-switcher" title="Rol değiştir">
      <i class="ph ph-user-switch"></i>
      <select id="roleSelect">
        <option value="buyer">Alıcı</option>
        <option value="seller">Satıcı / Emlakçı</option>
        <option value="admin">Yönetici</option>
      </select>
    </div>

    <button class="icon-btn" id="notifBtn" title="Bildirimler">
      <i class="ph ph-bell"></i>
      <span class="dot" id="notifDot"></span>
    </button>

    <button class="icon-btn hide-desktop" id="themeBtn" title="Tema">
      <i class="ph ph-moon" id="themeIcon"></i>
    </button>

    <div class="avatar" id="headerAvatar">U</div>
  </header>

  <!-- Main view -->
  <main class="app-main" id="appMain"></main>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav" id="bottomNav"></nav>

</div>

<!-- Sheet/Modal host -->
<div class="sheet-backdrop" id="sheetHost">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheetBody"></div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-host" id="toastHost"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
