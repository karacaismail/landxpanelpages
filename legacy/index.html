<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LandX — Arsa Pazaryeri</title>
  <meta name="description" content="LandX — AI-first arsa pazaryeri. Alıcı, satıcı ve yönetici panelleri.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- Desktop sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Header -->
  <header class="app-header">
    <div class="brand">
      <i class="ph-fill ph-map-trifold"></i>
      <span>LandX</span>
    </div>
    <div class="header-spacer"></div>

    <div class="role-switcher" title="Rol değiştir">
      <i class="ph ph-user-switch"></i>
      <select id="roleSelect">
        <option value="buyer">Alıcı</option>
        <option value="seller">Satıcı / Emlakçı</option>
        <option value="admin">Yönetici</option>
      </select>
    </div>

    <button class="icon-btn" id="notifBtn" title="Bildirimler">
      <i class="ph ph-bell"></i>
      <span class="dot" id="notifDot"></span>
    </button>

    <button class="icon-btn hide-desktop" id="themeBtn" title="Tema">
      <i class="ph ph-moon" id="themeIcon"></i>
    </button>

    <div class="avatar" id="headerAvatar">U</div>
  </header>

  <!-- Main view -->
  <main class="app-main" id="appMain"></main>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav" id="bottomNav"></nav>

</div>

<!-- Sheet/Modal host -->
<div class="sheet-backdrop" id="sheetHost">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheetBody"></div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-host" id="toastHost"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
